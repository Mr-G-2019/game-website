<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        body { margin: 0; overflow: hidden; }
        .game-wrapper { display: flex; gap: 20px; align-items: flex-start; }
        #gameCanvas { background: #0f0f23 !important; }
        .side-panel { color: white; }
        .next-piece { background: #1a1a3e; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        #nextCanvas { background: #0f0f23; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🧱 俄罗斯方块</h1>
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="side-panel">
                <div class="next-piece">
                    <h3>下一个</h3>
                    <canvas id="nextCanvas" width="120" height="120"></canvas>
                </div>
                <div class="game-info" style="flex-direction: column; gap: 10px;">
                    <div>得分: <span id="score" class="score">0</span></div>
                    <div>等级: <span id="level" class="score">1</span></div>
                    <div>行数: <span id="lines" class="score">0</span></div>
                </div>
            </div>
        </div>
        <div class="game-controls">
            <button class="game-btn game-btn-primary" id="startBtn">开始游戏</button>
            <button class="game-btn game-btn-primary" id="pauseBtn">暂停</button>
        </div>
        <div class="mobile-controls">
            <button class="control-btn" data-action="rotate">↻</button>
            <button class="control-btn" data-action="left">←</button>
            <button class="control-btn" data-action="down">↓</button>
            <button class="control-btn" data-action="right">→</button>
        </div>
        <p style="margin-top: 20px; color: #888;">← → 移动 | ↓ 加速 | ↑ 旋转</p>
    </div>
    <script src="tetris.js"></script>
</body>
</html>
